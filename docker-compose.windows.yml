#
# docker-compose.windows.yml — Windows Docker Desktop compatible
#
# Differences from docker-compose.yml:
#   - Removes `network_mode: host` (not supported on Docker Desktop for Windows)
#   - Uses explicit port mappings instead
#   - Uses Windows-style volume path for ~/.hermes
#
# Usage:
#   docker compose -f docker-compose.windows.yml up -d
#
services:
  gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    command: ["gateway", "run"]

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - ${USERPROFILE}/.hermes:/opt/data
    environment:
      - HERMES_UID=10000
      - HERMES_GID=10000
      # Dashboard 容器自己也要初始化 agent，需要 DeepSeek key。
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      # Dashboard 绑定 0.0.0.0 时安全闸门要求注册 auth provider；
      # 用内置 basic auth（凭据来自 .env）。宿主机侧仍只绑 127.0.0.1。
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_BASIC_AUTH_SECRET}
    ports:
      - "127.0.0.1:9119:9119"
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open"]
